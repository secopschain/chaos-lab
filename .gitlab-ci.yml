stages:
  - build
  - up
  - test
  - chaos_test
  - verify
  - observe
  - recovery
  - report
  - cleanup

image: docker:latest

services:
  - docker:dind

variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_TLS_CERTDIR: ""

#  Build stage
build:
  stage: build
  script:
    - docker compose build

#  Up stage (Start the stack)
up:
  stage: up
  script:
    - docker compose up -d
    - echo "Waiting for services to initialize..."
    - sleep 40

#  Test normal stage
test:
  test:
  stage: test
  script:
    - echo "Testing app connectivity..."
    - docker compose exec -T app curl -f http://localhost:5000 || exit 1

# 🌪 Chaos test stage
chaos_test:
  stage: chaos_test
  script:
    - echo "Testing under chaos (toxiproxy)"
    # Using the service name 'toxiproxy' instead of localhost
    - |
      TIME=$(docker compose exec -T app curl -o /dev/null -s -w "%{time_total}" http://toxiproxy:8666  echo "fail")
      echo "Response time: $TIME"
      if [ "$TIME" = "fail" ]; then
        echo "Service unreachable ❌"
        exit 1
      fi

# ✅ Verify stage
verify:
  stage: verify
  script:
    - echo "Verifying system stability"
    - |
      LATENCY=$(docker compose exec -T app curl -o /dev/null -s -w "%{time_total}" http://toxiproxy:8666)
      echo "Latency: $LATENCY"
      awk "BEGIN {exit !($LATENCY < 6)}"  (echo "Too slow ❌" && exit 1)
    - docker compose exec -T app curl -f http://toxiproxy:8666  exit 1

#  Observe stage
observe:
  stage: observe
  script:
    - echo "Checking metrics from Prometheus"
    - docker compose exec -T app curl -f "http://prometheus:9090/api/v1/query?query=up"
    - echo "Checking logs from Loki"
    - docker compose exec -T app curl -s "http://loki:3100/loki/api/v1/labels"  true

# Recovery stage
recovery:
  stage: recovery
  script:
    - echo "Waiting for system recovery..."
    - sleep 20
    - docker compose exec -T app curl -f http://localhost:5000  exit 1

#  Report stage
report:
  stage: report
  script:
    - echo "Generating report..."
    - |
      echo "Chaos Engineering Report" > report.md
      echo "-------------------------" >> report.md
      echo "✔️ System survived chaos" >> report.md
      echo "✔️ Monitoring active" >> report.md
      echo "✔️ Recovery successful" >> report.md
    - cat report.md
  artifacts:
    paths:
      - report.md

#  Cleanup stage
cleanup:
  stage: cleanup
  script:
    - docker compose down
  when: always
